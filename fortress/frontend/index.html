<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Fortress — Intelligence commerciale B2B. Trouvez et enrichissez vos leads parmi 14.7M d'entreprises françaises.">
    <title>Fortress — Intelligence B2B</title>
    <link rel="stylesheet" href="/css/design-system.css?v=14">
    <link rel="stylesheet" href="/css/components.css?v=14">
    <link rel="stylesheet" href="/css/landing.css?v=14">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏰</text></svg>">
</head>

<body>
    <div class="app-layout">
        <!-- ═══════════════ Sidebar ═══════════════ -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <span class="sidebar-brand-icon">🏰</span>
                <span class="sidebar-brand-text">Fortress</span>
                <span class="sidebar-brand-badge">v1.0</span>
            </div>

            <nav class="sidebar-nav">
                <div class="sidebar-section-label" data-i18n="sidebar.navigation">Navigation</div>

                <a href="#/" class="nav-item" data-page="dashboard" id="nav-dashboard" data-i18n-title="sidebar.dashboard" title="Dashboard">
                    <span class="nav-item-icon">📊</span>
                    <span data-i18n="sidebar.dashboard">Dashboard</span>
                </a>

                <a href="#/search" class="nav-item" data-page="search" id="nav-search" data-i18n-title="sidebar.baseSirene" title="Base SIRENE">
                    <span class="nav-item-icon">🏦</span>
                    <span data-i18n="sidebar.baseSirene">Base SIRENE</span>
                </a>

                <a href="#/contacts" class="nav-item" data-page="contacts" id="nav-contacts" data-i18n-title="sidebar.contacts" title="Contacts">
                    <span class="nav-item-icon">📇</span>
                    <span data-i18n="sidebar.contacts">Contacts</span>
                </a>

                <div class="sidebar-section-label" data-i18n="sidebar.operations">Opérations</div>

                <a href="#/new-batch" class="nav-item" data-page="new-batch" id="nav-new-batch" data-i18n-title="sidebar.newSearch" title="Nouvelle Recherche">
                    <span class="nav-item-icon">🚀</span>
                    <span data-i18n="sidebar.newSearch">Nouvelle Recherche</span>
                </a>

                <a href="#/monitor" class="nav-item" data-page="monitor" id="nav-monitor" data-i18n-title="sidebar.pipelineLive" title="Pipeline Live">
                    <span class="nav-item-icon">📡</span>
                    <span data-i18n="sidebar.pipelineLive">Pipeline Live</span>
                </a>

                <a href="#/upload" class="nav-item" data-page="upload" id="nav-upload" data-i18n-title="sidebar.importExport" title="Import / Export">
                    <span class="nav-item-icon">📤</span>
                    <span data-i18n="sidebar.importExport">Import / Export</span>
                </a>

                <div class="sidebar-section-label" data-i18n="sidebar.intelligence">Intelligence</div>

                <a href="#/open-query" class="nav-item" data-page="query" id="nav-query" data-i18n-title="sidebar.freeQuery" title="Requête Libre" style="display:none">
                    <span class="nav-item-icon">💬</span>
                    <span data-i18n="sidebar.freeQuery">Requête Libre</span>
                </a>

                <a href="#/activity" class="nav-item" data-page="activity" id="nav-activity" data-i18n-title="sidebar.journal" title="Journal">
                    <span class="nav-item-icon">📋</span>
                    <span data-i18n="sidebar.journal">Journal</span>
                </a>

                <a href="#/blacklist" class="nav-item" data-page="blacklist" id="nav-blacklist" data-i18n-title="sidebar.blacklist" title="Liste noire">
                    <span class="nav-item-icon">🚫</span>
                    <span data-i18n="sidebar.blacklist">Liste noire</span>
                </a>

                <div class="sidebar-section-label" id="nav-section-admin" data-i18n="sidebar.administration" style="display:none">Administration</div>

                <a href="#/admin" class="nav-item" data-page="admin" id="nav-admin" data-i18n-title="sidebar.users" title="Utilisateurs" style="display:none">
                    <span class="nav-item-icon">⚙️</span>
                    <span data-i18n="sidebar.users">Utilisateurs</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div id="user-display" class="sidebar-user-display hidden"></div>
                <div class="sidebar-footer-bottom">
                    <span class="sidebar-footer-version" data-i18n="sidebar.version">Fortress v1.0 · Zéro coût</span>
                    <button id="lang-toggle" class="lang-toggle" title="Switch to English">EN</button>
                </div>
                <a href="#" id="btn-logout" class="sidebar-footer-logout hidden" data-i18n="sidebar.logout">Déconnexion</a>
            </div>
        </aside>

        <!-- ═══════════════ Main Content ═══════════════ -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-right">
                    <span id="header-running-badge" class="badge badge-warning" style="display:none">
                        ⏳ Batch en cours
                    </span>
                </div>
            </header>

            <!-- Page content rendered by JS router -->
            <div id="page-content" class="page-container">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- SheetJS for XLSX support (client-side parsing + export) -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <!-- JS Modules -->
    <script type="module" src="/js/app.js?v=20"></script>
</body>

</html>
