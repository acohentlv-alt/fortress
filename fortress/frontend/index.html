<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Fortress — Intelligence commerciale B2B. Trouvez et enrichissez vos leads parmi 14.7M d'entreprises françaises.">
    <title>Fortress — Intelligence B2B</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/landing.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏰</text></svg>">
</head>

<body>
    <div class="app-layout">
        <!-- ═══════════════ Sidebar ═══════════════ -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <span class="sidebar-brand-icon">🏰</span>
                <span class="sidebar-brand-text">Fortress</span>
                <span class="sidebar-brand-badge">v1.0</span>
            </div>

            <nav class="sidebar-nav">
                <div class="sidebar-section-label">Navigation</div>

                <a href="#/" class="nav-item" data-page="dashboard" id="nav-dashboard" title="Dashboard">
                    <span class="nav-item-icon">📊</span>
                    <span>Dashboard</span>
                </a>

                <a href="#/search" class="nav-item" data-page="search" id="nav-search" title="Base SIRENE">
                    <span class="nav-item-icon">🏦</span>
                    <span>Base SIRENE</span>
                </a>

                <a href="#/contacts" class="nav-item" data-page="contacts" id="nav-contacts" title="Contacts">
                    <span class="nav-item-icon">📇</span>
                    <span>Contacts</span>
                </a>

                <div class="sidebar-section-label">Opérations</div>

                <a href="#/new-batch" class="nav-item" data-page="new-batch" id="nav-new-batch" title="Nouvelle Recherche">
                    <span class="nav-item-icon">🚀</span>
                    <span>Nouvelle Recherche</span>
                </a>

                <a href="#/monitor" class="nav-item" data-page="monitor" id="nav-monitor" title="Pipeline Live">
                    <span class="nav-item-icon">📡</span>
                    <span>Pipeline Live</span>
                </a>

                <a href="#/upload" class="nav-item" data-page="upload" id="nav-upload" title="Import / Export">
                    <span class="nav-item-icon">📤</span>
                    <span>Import / Export</span>
                </a>

                <div class="sidebar-section-label">Intelligence</div>

                <a href="#/open-query" class="nav-item" data-page="query" id="nav-query" title="Requête Libre">
                    <span class="nav-item-icon">💬</span>
                    <span>Requête Libre</span>
                </a>

                <a href="#/activity" class="nav-item" data-page="activity" id="nav-activity" title="Journal">
                    <span class="nav-item-icon">📋</span>
                    <span>Journal</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div id="user-display" class="sidebar-user-display hidden"></div>
                <span class="sidebar-footer-version">Fortress v1.0 · Zéro coût</span>
                <a href="#" id="btn-logout" class="sidebar-footer-logout hidden">Déconnexion</a>
            </div>
        </aside>

        <!-- ═══════════════ Main Content ═══════════════ -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-search">
                    <span class="header-search-icon">🔍</span>
                    <input type="text" id="global-search" placeholder="Rechercher par nom ou SIREN..."
                        autocomplete="off">
                </div>
                <div class="header-right">
                    <span id="header-running-badge" class="badge badge-warning" style="display:none">
                        ⏳ Batch en cours
                    </span>
                </div>
            </header>

            <!-- Page content rendered by JS router -->
            <div id="page-content" class="page-container">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- SheetJS for XLSX support (client-side parsing + export) -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <!-- JS Modules -->
    <script type="module" src="/js/app.js?v=11"></script>
</body>

</html>
